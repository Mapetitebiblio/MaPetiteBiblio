<!doctype html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MaPetiteBiblio — v6.1</title>
<link rel="icon" href="favicon.ico" />
<link rel="manifest" href="manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#f8e2e8;--card:#fff;--ink:#111827;--muted:#6b7280;--radius:16px}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
.wrap{max-width:720px;margin:0 auto;padding:20px}
.card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid #eee;box-shadow:0 8px 30px rgba(0,0,0,.05);margin-top:14px}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border-radius:14px;border:1px solid #e5e7eb;background:#fff;font-weight:800;color:#111827;font-size:18px;text-decoration:none}
.btn.primary{background:#ef9fb2;color:#581c28}
.small{font-size:13px;color:var(--muted)}
.logo{display:flex;justify-content:center;margin-top:10px}
.logo img{width:160px;height:160px;border-radius:999px}
h1{margin:10px 0 0 0;text-align:center;font-size:24px}
</style></head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo"><img src="logo.png" alt="MaPetiteBiblio"></div>
    <h1>MaPetiteBiblio</h1>
    <p style="text-align:center;margin:8px 0 0 0;">Version <b>v6.1</b> : correction de l’affichage du code + toutes les fonctions.</p>
    <div class="grid" style="margin-top:12px">
      <a class="btn primary" href="app.html#pret">📦 Prêter un livre</a>
      <a class="btn" href="app.html#rendre">✅ Rendre un livre</a>
      <a class="btn" href="app.html#eleves">👧👦 ÉLÈVES</a>
      <a class="btn" href="app.html#livres">📚 LIVRES</a>
      <a class="btn" href="app.html#historique">🗂️ Historique</a>
    </div>
    <p class="small" style="text-align:center">iPhone : Partager → <i>Sur l’écran d’accueil</i>.</p>
  </div>
</div>
<script>if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js'))}</script>
</body></html>
