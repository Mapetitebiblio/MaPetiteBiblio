<!doctype html>
<html lang='fr'><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>
<title>MaPetiteBiblio — v5</title>
<link rel='manifest' href='manifest.json'><meta name='apple-mobile-web-app-capable' content='yes'><link rel='apple-touch-icon' href='icon-192.png'>
<style>
:root{--bg:#f8e2e8;--card:#fff;--ink:#111827;--muted:#6b7280;--accent:#ef9fb2;--accent-ink:#4a1723;--radius:18px;--pad:16px}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
header{position:sticky;top:0;background:rgba(248,226,232,.9);backdrop-filter:blur(8px);padding:10px 14px;border-bottom:1px solid #f3d3da;z-index:10}
h1{margin:0;font-size:18px;display:flex;align-items:center;gap:8px}h1 img{width:24px;height:24px;border-radius:6px;border:1px solid #eee}
main{max-width:720px;margin:0 auto;padding:12px; padding-bottom:90px}
.card{background:var(--card);border-radius:var(--radius);border:1px solid #eee;box-shadow:0 12px 32px rgba(0,0,0,.06);padding:var(--pad);margin-top:12px}
label{font-size:14px;color:#374151;margin-bottom:6px;display:block}
input,select,button,textarea{font-size:18px}
input[type=text],input[type=date],select,textarea{width:100%;padding:14px;border:1px solid #e5e7eb;border-radius:14px;background:#fff}
.big{font-size:20px;padding:16px;border-radius:16px;width:100%;font-weight:800}
.btn{appearance:none;border:1px solid #e5e7eb;background:#fff;color:#111827}
.btn.primary{background:var(--accent);color:var(--accent-ink)}
.row{display:grid;gap:10px}.actions{display:flex;gap:10px;flex-wrap:wrap}
.kbd{display:inline-block;padding:2px 8px;border:1px solid #ddd;border-radius:6px;background:#f9fafb;font-size:12px;color:#6b7280}
.helper{color:#6b7280;font-size:14px;margin-top:6px}
#toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 14px;border-radius:12px;opacity:0;pointer-events:none;transition:.2s;z-index:50}
#toast.show{opacity:1}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:8px 6px;z-index:20}
.nav a{flex:1;text-align:center;text-decoration:none;color:#374151;font-weight:700;padding:8px;border-radius:12px}
.nav a.active{background:var(--accent);color:var(--accent-ink)}
.hidden{display:none}.scanbox{background:#000;border-radius:16px;aspect-ratio:3/2;width:100%}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#f3f4f6;border:1px solid #e5e7eb;font-size:12px;margin-left:8px}
</style></head>
<body>
<header><h1><img src='icon-192.png'>MaPetiteBiblio</h1></header>
<main>
  <div class='card' id='screen-pret'>
    <h2>📦 Prêter un livre</h2>
    <div class='row'>
      <div class='actions'>
        <select id='selStudent' class='big' style='flex:1'></select>
        <button class='big btn' id='scanQRBtn' style='flex:1'>🎟️ QR élève</button>
      </div>
      <input type='text' id='bookCode' inputmode='numeric' placeholder='Scanne ou saisis le code du livre'>
      <div class='actions'>
        <button class='big btn primary' id='btnPret'>Enregistrer le prêt</button>
        <button class='big btn' id='btnScanBook'>📷 Scanner livre</button>
      </div>
      <div class='helper'>Astuce : QR élève → code livre = prêt en 2 gestes.</div>
    </div>
  </div>

  <div class='card hidden' id='screen-rendre'>
    <h2>✅ Rendre un livre</h2>
    <p class='helper'>Scanne le code du livre emprunté, il sera marqué <b>rendu</b> automatiquement.</p>
    <div class='actions'>
      <button class='big btn primary' id='btnScanReturn'>📷 Scanner livre</button>
      <input type='text' id='returnCode' class='big' placeholder='Ou entrer le code'>
    </div>
    <button class='big btn' id='btnDoReturn' style='margin-top:10px'>Valider le retour</button>
  </div>

  <div class='card hidden' id='screen-eleves'>
    <h2>👧👦 Élèves <span class='badge' id='badgeStudents'>0</span></h2>
    <div class='actions'>
      <input type='text' id='inStudentName' placeholder='Prénom (ex. Zoé)' style='flex:2'>
      <button class='btn primary' id='btnAddStudent' style='flex:1'>Ajouter</button>
    </div>
    <label style='margin-top:10px'>Ajouter en liste (un prénom par ligne)</label>
    <textarea id='inBulk' placeholder='Zoé
Liam
Nina'></textarea>
    <button class='big btn' id='btnAddBulk' style='margin-top:8px'>Ajouter la liste</button>
    <div id='listStudents' class='helper' style='margin-top:10px'></div>
  </div>

  <div class='card hidden' id='screen-livres'>
    <h2>📚 Livres <span class='badge' id='badgeBooks'>0</span></h2>
    <div class='actions'>
      <input type='text' id='inBookCode' placeholder='Code (ISBN/barres)' style='flex:1'>
      <input type='text' id='inBookTitle' placeholder='Titre (facultatif)' style='flex:1'>
      <button class='btn primary' id='btnAddBook' style='flex:1'>Ajouter</button>
    </div>
    <button class='big btn' id='btnScanAddBook' style='margin-top:8px'>📷 Scanner pour ajouter</button>
    <div id='listBooks' class='helper' style='margin-top:10px'></div>
  </div>

  <div class='card hidden' id='screen-histo'>
    <h2>🗂️ Historique</h2>
    <div id='histoList' class='helper'></div>
    <button class='big btn' id='btnExport' style='margin-top:10px'>⬇️ Exporter CSV</button>
  </div>
</main>

<div id='toast'></div>

<nav class='nav'>
  <a href='#pret' id='tab-pret' class='active'>Prêter</a>
  <a href='#rendre' id='tab-rendre'>Rendre</a>
  <a href='#eleves' id='tab-eleves'>Élèves</a>
  <a href='#livres' id='tab-livres'>Livres</a>
  <a href='#historique' id='tab-historique'>Historique</a>
</nav>

<script src='https://unpkg.com/@zxing/library@0.20.0'></script>
<script>
const DBKEY='mpb_v5'; const $=s=>document.querySelector(s); const screens={pret:'#screen-pret',rendre:'#screen-rendre',eleves:'#screen-eleves',livres:'#screen-livres',historique:'#screen-histo'};
let state; try{state=JSON.parse(localStorage.getItem(DBKEY) || '{"students":[],"books":[],"loans":[],"history":[]}')}catch(e){state={"students":[],"books":[],"loans":[],"history":[]}};
function save(){ try{localStorage.setItem(DBKEY, JSON.stringify(state));}catch(e){} }
function uid(p){ return p+Math.random().toString(36).slice(2,9); }
function today(){ return new Date().toISOString().slice(0,10); }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1400); }

function show(tab){
  Object.values(screens).forEach(s=>$(s).classList.add('hidden'));
  ( $(screens[tab]) || $(screens.pret) ).classList.remove('hidden');
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
  $('#tab-'+tab)?.classList.add('active');
  location.hash='#'+tab; render();
}
window.addEventListener('hashchange', ()=> show((location.hash||'#pret').slice(1)) );

function render(){
  $('#selStudent').innerHTML='<option value="">— choisir —</option>'+ state.students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  $('#badgeStudents').textContent=state.students.length;
  $('#listStudents').innerHTML = state.students.map(s=>`• ${s.name}`).join('<br>') || 'Aucun élève pour le moment.';
  $('#badgeBooks').textContent=state.books.length;
  $('#listBooks').innerHTML = state.books.map(b=>`• ${b.title? (b.title+' — '): ''}<code>${b.code}</code>`).join('<br>') || 'Aucun livre pour le moment.';
  $('#histoList').innerHTML = state.history.slice().reverse().map(h=>{
    const s=state.students.find(x=>x.id===h.studentId)?.name||'—';
    const b=state.books.find(x=>x.id===h.bookId)?.title||state.books.find(x=>x.id===h.bookId)?.code||'—';
    return `• ${h.dateOut} — ${s} → ${b}${h.dateIn? ' (retour '+h.dateIn+')':''}`;
  }).join('<br>') || 'Aucun historique.';
}

// Students
$('#btnAddStudent').addEventListener('click', ()=>{
  const name=($('#inStudentName').value||'').trim(); if(!name) return toast('Entre un prénom');
  state.students.push({id:uid('s_'), name}); $('#inStudentName').value=''; save(); render(); toast('Élève ajouté');
});
$('#btnAddBulk').addEventListener('click', ()=>{
  const lines=($('#inBulk').value||'').split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  if(!lines.length) return toast('Liste vide');
  const exists=new Set(state.students.map(s=>s.name.toLowerCase())); let n=0;
  lines.forEach(nm=>{ if(!exists.has(nm.toLowerCase())){ state.students.push({id:uid('s_'), name:nm}); n++; } });
  $('#inBulk').value=''; save(); render(); toast(n+' élèves ajoutés');
});

// Books
$('#btnAddBook').addEventListener('click', ()=>{
  const code=($('#inBookCode').value||'').trim(); if(!code) return toast('Entre un code');
  if(state.books.some(b=>b.code===code)) return toast('Code déjà présent');
  const title=($('#inBookTitle').value||'').trim(); state.books.push({id:uid('b_'), code, title}); $('#inBookCode').value=''; $('#inBookTitle').value=''; save(); render(); toast('Livre ajouté');
});

// Loan
$('#btnPret').addEventListener('click', ()=>{
  const sid=$('#selStudent').value; const code=($('#bookCode').value||'').trim();
  if(!sid) return toast('Choisis l’élève'); if(!code) return toast('Scanne/entre le code');
  let book=state.books.find(b=>b.code===code); if(!book){ book={id:uid('b_'), code, title:''}; state.books.push(book); }
  if(state.loans.find(l=>l.bookId===book.id)) return toast('Déjà emprunté');
  state.loans.push({id:uid('l_'), studentId:sid, bookId:book.id, dateOut:today()});
  state.history.push({id:uid('h_'), studentId:sid, bookId:book.id, dateOut:today(), dateIn:null});
  $('#bookCode').value=''; save(); render(); toast('Prêt enregistré');
});

// Return
$('#btnDoReturn').addEventListener('click', ()=>{
  const code=($('#returnCode').value||'').trim(); if(!code) return toast('Entre/scanne le code');
  const book=state.books.find(b=>b.code===code); if(!book) return toast('Livre inconnu');
  const i=state.loans.findIndex(l=>l.bookId===book.id); if(i<0) return toast('Pas en prêt');
  const loan=state.loans[i]; state.loans.splice(i,1);
  const hist=state.history.slice().reverse().find(h=>h.bookId===loan.bookId && !h.dateIn); if(hist) hist.dateIn=today();
  $('#returnCode').value=''; save(); render(); toast('Rendu enregistré');
});

// Scanner (ZXing)
let reader;
async function scan(callback){
  try{
    if(!reader) reader=new ZXing.BrowserMultiFormatReader();
    const devs=await ZXing.BrowserCodeReader.listVideoInputDevices(); const id=devs?.[0]?.deviceId; if(!id) throw new Error('Aucune caméra');
    const video=document.createElement('video'); video.className='scanbox'; video.playsInline=true;
    const wrap=document.createElement('div'); wrap.className='card'; wrap.appendChild(video); document.querySelector('main').prepend(wrap);
    await reader.decodeFromVideoDevice(id, video, (res,err)=>{ if(res){ if(navigator.vibrate) navigator.vibrate(50); try{reader.reset()}catch(e){}; wrap.remove(); callback(res.text); } });
  }catch(e){ alert('Scan impossible : '+e.message); }
}
$('#scanQRBtn').addEventListener('click', ()=> scan((txt)=>{
  if(String(txt).startsWith('MPB:')){
    const sid=String(txt).slice(4); const s=state.students.find(x=>x.id===sid); if(s){ $('#selStudent').value=s.id; toast('Élève : '+s.name); } else toast('QR inconnu');
  }else toast('QR élève attendu');
}));
$('#btnScanBook').addEventListener('click', ()=> scan((txt)=>{ $('#bookCode').value=txt; toast('Code livre scanné'); }));
$('#btnScanAddBook').addEventListener('click', ()=> scan((txt)=>{ $('#inBookCode').value=txt; toast('Code détecté'); }));
$('#btnScanReturn').addEventListener('click', ()=> scan((txt)=>{ $('#returnCode').value=txt; $('#btnDoReturn').click(); }));

// Export
$('#btnExport').addEventListener('click', ()=>{
  const rows=[['Type','Date prêt','Date retour','Élève','Livre','Code']];
  state.history.forEach(h=>{
    const s=state.students.find(x=>x.id===h.studentId)?.name||''; const b=state.books.find(x=>x.id===h.bookId);
    rows.push(['HISTORIQUE', h.dateOut||'', h.dateIn||'', s, b?.title||b?.code||'', b?.code||'']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='mapetitebiblio.csv'; a.click();
});

// Init
if('serviceWorker' in navigator){ addEventListener('load', ()=> navigator.serviceWorker.register('service-worker.js')); }
show((location.hash||'#pret').slice(1)); render();
</script>
</body></html>
